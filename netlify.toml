# Netlify config for ai-impact-system
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

  ## SPA catch-all redirect for client-side routing.
  ## /api/* is handled before this by the redirect below.
  [[redirects]]
    from = "/api/scorecard-submit"
    to = "/.netlify/functions/scorecard-submit"
    status = 200

  [[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200

## Security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://cal.com; frame-src embeds.beehiiv.com *.beehiiv.com https://cal.com https://*.cal.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://aiimpactsystem.beehiiv.com"

## Cache headers for static assets (Vite hashed filenames are safe to cache long-term)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
